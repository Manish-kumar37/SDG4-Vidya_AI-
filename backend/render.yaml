services:
  - type: web
    name: vidya-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_ID
        value: llama-3.3-70b-versatile
      - key: WATSONX_API_KEY
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
      - key: WATSONX_URL
        value: https://us-south.ml.cloud.ibm.com
      - key: WATSONX_MODEL_ID
        value: ibm/granite-3-3-8b-instruct
      - key: ALLOWED_ORIGINS
        sync: false
